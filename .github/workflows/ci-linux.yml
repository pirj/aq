name: CI (Linux)

on:
  push:
    branches: [main, phase-1-linux-host-support]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM access for runner user
        run: |
          ls -l /dev/kvm
          # GitHub-hosted runners ship /dev/kvm as crw-rw---- root:kvm.
          # The runner user is not in the kvm group, so widen permissions.
          sudo chmod 666 /dev/kvm
          ls -l /dev/kvm
          [ -r /dev/kvm ] && [ -w /dev/kvm ] || {
            echo "::error::/dev/kvm is still not accessible after chmod"
            exit 1
          }

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 qemu-utils \
            socat \
            ovmf \
            wget gpg \
            coreutils \
            meson ninja-build pkg-config liblua5.4-dev libinih-dev

      - name: Build tio from source (Ubuntu's tio is too old for --script)
        run: |
          git clone --depth 1 --branch v3.10 https://github.com/tio/tio.git /tmp/tio
          cd /tmp/tio
          meson setup build
          meson compile -C build
          sudo meson install -C build
          tio --version

      - name: Add SSH key for guest provisioning
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Run smoke test
        run: bash tests/run.sh
