name: Bench (aq vs macpine — macOS HVF)

on:
  push:
    paths:
      - aq
      - tests/bench-aq-start.sh
      - tests/bench-macpine-start.sh
      - .github/workflows/bench-macos.yml
  workflow_dispatch:
    inputs:
      runs:
        description: "Runs per side"
        default: "5"
        required: false

jobs:
  bench:
    # macos-latest is GH's Apple Silicon (aarch64 + HVF) image — matches aq's
    # macOS target. The aq run uses QEMU-via-brew + HVF; macpine uses the
    # same QEMU under the hood plus its own wrapping.
    runs-on: macos-latest
    timeout-minutes: 40
    env:
      RUNS: ${{ github.event.inputs.runs || '5' }}
      AQ_SSH_PROBE_INTERVAL: "0.1"
    steps:
      - uses: actions/checkout@v4

      - name: Install deps via brew
        run: |
          # qemu+socat+tio for aq; coreutils for `shuf`; macpine provides
          # the `alpine` CLI. macpine and aq don't conflict at the qemu
          # level — they each open their own VMs.
          brew update >/dev/null
          brew install qemu socat tio coreutils wget gnupg
          brew install macpine
          qemu-system-aarch64 --version | head -1
          alpine help | head -1

      - name: HVF available
        run: sysctl kern.hv_support

      - name: Add SSH key for aq
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Pre-build aq base (warm-up)
        run: |
          ./aq new --size=2G _warmup
          ./aq start _warmup
          ./aq stop _warmup
          ./aq rm _warmup

      - name: bench — aq cold (new + start)
        run: bash tests/bench-aq-start.sh -n "$RUNS" -l aq_cold | tee -a bench.tsv

      - name: bench — aq live restore (from-snapshot with memory)
        # Expected to fail on QEMU 11.0.0+ aarch64 HVF because of the
        # upstream ARM-target migration assert at machine.c:1045. Allowed
        # to fail so the rest of the workflow still produces results;
        # status surfaces in the workflow log + summary.
        continue-on-error: true
        run: bash tests/bench-aq-from-live-snapshot.sh -n "$RUNS" -l aq_live | tee -a bench.tsv

      - name: bench — macpine start
        run: bash tests/bench-macpine-start.sh -n "$RUNS" -l macpine_start | tee -a bench.tsv

      - name: Summary
        if: always()
        run: |
          {
            echo "## aq vs macpine — macOS aarch64 HVF, same runner"
            echo
            echo "QEMU: \`$(qemu-system-aarch64 --version | head -1)\`"
            echo "macpine: \`$(alpine help 2>&1 | head -1 | tr -d '[:cntrl:]')\`"
            echo "Host: \`$(uname -srvm)\`"
            echo
            echo "| target | min | median | max | n |"
            echo "|---|---|---|---|---|"
            grep '^summary' bench.tsv | while IFS=$'\t' read -r tag label data; do
              min=$(echo "$data" | sed -E 's/.*min=([0-9]+)ms.*/\1/')
              med=$(echo "$data" | sed -E 's/.*median=([0-9]+)ms.*/\1/')
              max=$(echo "$data" | sed -E 's/.*max=([0-9]+)ms.*/\1/')
              n=$(echo "$data"   | sed -E 's/.*n=([0-9]+).*/\1/')
              echo "| $label | ${min}ms | ${med}ms | ${max}ms | $n |"
            done
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload bench.tsv
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-macos
          path: bench.tsv
