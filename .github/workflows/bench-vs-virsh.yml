name: Bench (aq vs virsh/libvirt — Linux VM-vs-VM)

on:
  push:
    paths:
      - aq
      - tests/bench-aq-start.sh
      - tests/bench-virsh-start.sh
      - .github/workflows/bench-vs-virsh.yml
  workflow_dispatch:
    inputs:
      runs:
        description: "Runs per side"
        default: "5"
        required: false

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RUNS: ${{ github.event.inputs.runs || '5' }}
      AQ_SSH_PROBE_INTERVAL: "0.1"
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM access for runner user
        run: |
          sudo chmod 666 /dev/kvm
          [ -r /dev/kvm ] && [ -w /dev/kvm ]

      - name: Restore apt cache
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: aq-ci-apt-noble-v5
          restore-keys: aq-ci-apt-noble-

      - name: Install deps (aq + libvirt + cloud-init tooling)
        run: |
          sudo chmod -R a+r /var/cache/apt/archives 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils socat ovmf \
            wget gpg ca-certificates coreutils \
            meson ninja-build pkg-config liblua5.4-dev libinih-dev libglib2.0-dev \
            git build-essential netcat-openbsd \
            libvirt-daemon-system libvirt-clients virtinst libosinfo-bin \
            cloud-image-utils \
            dnsmasq-base bridge-utils iptables

      - name: Start libvirtd + default network
        run: |
          set -x
          sudo systemctl enable --now libvirtd
          sudo virsh net-info default >/dev/null 2>&1 \
            || sudo virsh net-define /usr/share/libvirt/networks/default.xml
          # Surface net-start failure rather than swallowing it. GH ubuntu-latest
          # ships nftables and modular netfilter; libvirt may need nft modules
          # loaded before its iptables shim can install NAT rules.
          sudo modprobe nf_nat nf_conntrack 2>/dev/null || true
          sudo virsh net-start default || {
            sudo journalctl -u libvirtd --no-pager -n 50
            sudo virsh net-list --all
            exit 1
          }
          sudo virsh net-autostart default
          sudo virsh net-list --all

      - name: Restore tio
        id: tio-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/tio
          key: aq-ci-tio-v3.9-noble

      - name: Build tio
        if: steps.tio-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v3.9 https://github.com/tio/tio.git /tmp/tio
          cd /tmp/tio && meson setup build && meson compile -C build && sudo meson install -C build

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Pre-build aq base
        run: |
          ./aq new --size=2G _warmup
          ./aq start _warmup
          ./aq stop _warmup
          ./aq rm _warmup

      - name: bench — aq cold (new + start)
        run: bash tests/bench-aq-start.sh -n "$RUNS" -l aq_cold | tee -a bench.tsv

      - name: bench — virsh start (Alpine cloud image)
        run: bash tests/bench-virsh-start.sh -n "$RUNS" -l virsh_start | tee -a bench.tsv

      - name: Summary
        if: always()
        run: |
          {
            echo "## aq vs virsh — same Linux runner, same probe granularity (100 ms)"
            echo
            echo "QEMU: \`$(qemu-system-x86_64 --version | head -1)\`"
            echo "virsh: \`$(virsh --version 2>&1 | head -1)\`"
            echo "Host: \`$(uname -srvm)\`"
            echo
            echo "| target | min | median | max | n |"
            echo "|---|---|---|---|---|"
            grep '^summary' bench.tsv | while IFS=$'\t' read -r tag label data; do
              min=$(echo "$data" | sed -E 's/.*min=([0-9]+)ms.*/\1/')
              med=$(echo "$data" | sed -E 's/.*median=([0-9]+)ms.*/\1/')
              max=$(echo "$data" | sed -E 's/.*max=([0-9]+)ms.*/\1/')
              n=$(echo "$data"   | sed -E 's/.*n=([0-9]+).*/\1/')
              echo "| $label | ${min}ms | ${med}ms | ${max}ms | $n |"
            done
            echo
            echo "**aq_cold**: \`aq new --size=2G\` + \`aq start\` — direct kernel boot, OpenRC, sshd ready."
            echo "**virsh_start**: \`virsh start <dom>\` from shutdown — full UEFI/seabios boot, cloud-init, OpenRC, sshd ready."
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload bench.tsv
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-vs-virsh
          path: bench.tsv
